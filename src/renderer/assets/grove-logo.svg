<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grove-bg" x1="256" y1="0" x2="256" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1c2a22"/>
      <stop offset="1" stop-color="#0e1411"/>
    </linearGradient>
    <linearGradient id="grove-leaf" x1="256" y1="96" x2="256" y2="372" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5ee08a"/>
      <stop offset="1" stop-color="#1f9d56"/>
    </linearGradient>
    <linearGradient id="grove-leaf2" x1="256" y1="120" x2="256" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#46c878"/>
      <stop offset="1" stop-color="#178f4a"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="116" fill="url(#grove-bg)"/>

  <!-- ground -->
  <rect x="120" y="378" width="272" height="16" rx="8" fill="#27392e"/>

  <!-- left tree (short) -->
  <rect x="160" y="300" width="18" height="86" rx="9" fill="#7a5436"/>
  <circle cx="169" cy="296" r="42" fill="url(#grove-leaf2)"/>
  <circle cx="146" cy="278" r="30" fill="url(#grove-leaf2)"/>
  <circle cx="192" cy="278" r="30" fill="url(#grove-leaf2)"/>

  <!-- right tree (medium) -->
  <rect x="334" y="288" width="18" height="98" rx="9" fill="#7a5436"/>
  <circle cx="343" cy="284" r="48" fill="url(#grove-leaf2)"/>
  <circle cx="316" cy="262" r="32" fill="url(#grove-leaf2)"/>
  <circle cx="370" cy="262" r="32" fill="url(#grove-leaf2)"/>

  <!-- center tree (tall, front) -->
  <rect x="246" y="262" width="22" height="128" rx="11" fill="#8a6140"/>
  <circle cx="257" cy="232" r="70" fill="url(#grove-leaf)"/>
  <circle cx="214" cy="214" r="44" fill="url(#grove-leaf)"/>
  <circle cx="300" cy="214" r="44" fill="url(#grove-leaf)"/>
  <circle cx="257" cy="176" r="50" fill="url(#grove-leaf)"/>
  <!-- highlight -->
  <circle cx="238" cy="166" r="13" fill="#bff4d2" opacity="0.55"/>
</svg>
